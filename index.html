<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms </title>
</head>
<body>
    <table border="1">
    <form>
        
            <table>

<tr>
    <th><label for="firstname"> First Name</label></th>
        <td><input type="text" name="firstname" id="firstname" placeholder="ex:barbie" required></td>

</tr>
<tr>
    <th><label for="lasttname"> Last Name</label></th>
        <td><input type="text" name="lastname" id="lastname" ></td>

</tr>
<tr>
    <th>
        <label for="surname">Surname</label>
    </th>
    <td>
        <input type="text" name="surname" id="surname" required>
    </td>
</tr>
<tr>
    <th>
        <label for="mobilenumber">Mobile Number</label>
    </th>
    <td>
        <input type="tel" name="mobilenumber" id="mobilenumber" max="10" placeholder="+91 12345 67890">

    </td>
</tr>
<tr>
    <th>
        <label for="email"> E-Mail</label>
    </th>
    <td>
        <input type="email" name="email" id="email" placeholder="barbie@gmail.com" required>
    </td>
</tr>
<tr>
    <th>
        <label for="password">Password</label>
    </th>
    <td>
        <input type="password" name="password" id="password" placeholder="********" required>
    </td>
</tr>
<tr>
    <th>
        <label for="dob">DOB</label>
    </th>
    <td>
        <input type="date" name="dob" id="dob">
    </td>
</tr>
<tr>
    <th>
        <label for="age"> Age</label>
    </th>
    <td>
        <input type="number" name="age" id="age">
    </td>
</tr>
<tr>
    <th><label for="gender">Gender</label></th>

<td>
    <input type="radio"  name="gender" id="gender" value="Male"><label > Male</label>

    <input type="radio"  name="gender" id="gender" value=Female"><label >Female</label>


    <input type="radio"   name="gender" id="gender" value="others"><label > Others</label>
</td></tr>
<tr>
    <th>
        <label for="select">Select Country</label>
    </th>
    <td>
        <select name="select" id="select">
<option value="India">india</option>
<option value="USA">USA</option>

<option value="China">China</option>


        </select>
       
    </td>
</tr>

<tr>
    <th>
        <label for="upload"> Upload file</label>
    </th>
    <td>
        <input type="file" name="upload" id="upload" placeholder="choose file">
    </td>
</tr>
<tr>
     
    <th><h2>Course Details</h2></th>
</tr>
<tr>
    <th>
        <label for="duration">Select</label>
    </th>
    <td>
        <select name="duration" id="duration" >
           <option value="2 months"> 2 months</option>
           <option value="4 months"> 4 months</option>
           <option value="6 months"> 6 months</option>
        </select>
    </td>
</tr>
<tr>
    <th>
        <label for="select"> Courses</label>
    </th>
    <td>
        <input type="checkbox" name="select" id="select" value="Python"><label >Python</label>
        <input type="checkbox" name="select" id="select" value="JAVA"><label >JAVA</label>
        <input type="checkbox" name="select" id="select" value="HTML"><label >HTML</label>
    </td>
</tr>
<tr>
    <th>
        <label for="inst name"> Institute Name</label>
    </th>
    <td>
        <input type="text" name="inst name" id="inst name">

    </td>
</tr>
<tr>
   <th>
       <h2><label for="comment">comments</label></h2>
    </th>

</tr>
<tr >
<td >
    <textarea name="comment" id="comment" >fill the feedback field</textarea>
</td>
</tr>
<tr>
    <th> <input type="submit"></th>
    <th> <input type="reset"></th>
</tr>
        </table>
        

    </form>
</table>

    
</body>
</html>
